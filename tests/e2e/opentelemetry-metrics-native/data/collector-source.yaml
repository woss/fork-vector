receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
      grpc:

processors:
  batch: {}
  transform/scope:
    metric_statements:
      - context: scope
        statements:
          - set(name, "vector-e2e-metrics")
          - set(version, "1.2.3")

exporters:
  otlp/grpc:
    endpoint: vector:4317
    tls:
      insecure: true
  otlphttp/vector:
    endpoint: http://vector:4318
    tls:
      insecure: true
  debug: {}

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [transform/scope, batch]
      exporters: [debug, otlp/grpc, otlphttp/vector]
