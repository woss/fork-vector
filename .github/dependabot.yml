version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "04:00" # UTC
    labels:
      - "domain: deps"
      - "no-changelog"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 100
    groups:
      patches:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"

      amq:
        patterns:
          - "amq-*"
        update-types:
          - "patch"
          - "minor"
      aws:
        patterns:
          - "aws-*"
        update-types:
          - "patch"
          - "minor"
      azure:
        patterns:
          - "azure_*"
        update-types:
          - "patch"
          - "minor"
      clap:
        patterns:
          - "clap*"
        update-types:
          - "patch"
          - "minor"
      crossbeam:
        patterns:
          - "crossbeam*"
        update-types:
          - "patch"
          - "minor"
      csv:
        patterns:
          - "csv*"
        update-types:
          - "patch"
          - "minor"
      futures:
        patterns:
          - "futures"
          - "futures-util"
        update-types:
          - "patch"
          - "minor"
      metrics:
        patterns:
          - "metrics"
          - "metrics-tracing-context"
          - "metrics-util"
        update-types:
          - "patch"
          - "minor"
      netlink:
        patterns:
          - "netlink-*"
        update-types:
          - "patch"
          - "minor"
      phf:
        patterns:
          - "phf*"
        update-types:
          - "patch"
          - "minor"
      prost:
        patterns:
          - "prost"
          - "prost-*"
        update-types:
          - "patch"
          - "minor"
      serde:
        patterns:
          - "serde"
          - "serde_*"
        update-types:
          - "patch"
          - "minor"
      tokio:
        patterns:
          - "tokio"
          - "tokio-*"
        update-types:
          - "patch"
          - "minor"
      tonic:
        patterns:
          - "tonic"
          - "tonic-*"
        update-types:
          - "patch"
          - "minor"
      tower:
        patterns:
          - "tower"
          - "tower-*"
        update-types:
          - "patch"
          - "minor"
      tracing:
        patterns:
          - "tracing"
          - "tracing-*"
        update-types:
          - "patch"
          - "minor"
      wasm-bindgen:
        patterns:
          - "wasm-bindgen-*"
        update-types:
          - "patch"
          - "minor"
      zstd:
        patterns:
          - "zstd*"
        update-types:
          - "patch"
          - "minor"

      cargo-other:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      # Without this group, major bumps matching any group pattern are silently
      # dropped instead of falling through to individual PRs (dependabot-core#14202).
      cargo-major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"
      cargo-security:
        applies-to: security-updates
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directories:
      - "/distribution/docker/alpine"
      - "/distribution/docker/debian"
      - "/distribution/docker/distroless-static"
      - "/distribution/docker/distroless-libc"
    schedule:
      interval: "monthly"
      time: "04:00" # UTC
    labels:
      - "domain: releasing"
      - "no-changelog"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 100
    groups:
      docker-images:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "domain: ci"
      - "no-changelog"
    commit-message:
      prefix: "chore(ci)"
    groups:
      artifact:
        patterns:
          - "actions/download-artifact"
          - "actions/upload-artifact"
  - package-ecosystem: "npm"
    directory: "website/"
    schedule:
      interval: "monthly"
      time: "05:00" # UTC
    labels:
      - "dependencies"
      - "javascript"
      - "no-changelog"
    commit-message:
      prefix: "chore(website deps)"
    open-pull-requests-limit: 50
    groups:
      npm_and_yarn:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/scripts/environment/npm-tools"
    schedule:
      interval: "monthly"
      time: "05:00" # UTC
    labels:
      - "domain: deps"
      - "no-changelog"
    commit-message:
      prefix: "chore(deps)"
    # Disable version updates; security updates bypass this limit
    open-pull-requests-limit: 0
    groups:
      npm_and_yarn:
        patterns:
          - "*"
